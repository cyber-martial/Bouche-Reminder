<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bouché Organisation</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bouché Organisation">
<meta name="theme-color" content="#1B2430">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Zilla+Slab:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B2430;
  --navy-2:#242F3D;
  --paper:#EDE3D0;
  --paper-2:#F7F1E3;
  --chalk:#F7F4EC;
  --rust:#C4502A;
  --rust-dark:#9C3A1C;
  --graphite:#3A3A3A;
  --ink-fade:#9C8B6A;
  --ok-green:#5C7A52;
  --warn-amber:#C98A2C;
  --late-red:#B23A2E;
  --shadow: 0 6px 16px rgba(0,0,0,0.28), 0 1px 3px rgba(0,0,0,0.35);
  --radius: 4px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{height:100%; margin:0; overscroll-behavior:none;}
body{
  background: var(--navy);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 1px);
  background-size: 22px 22px;
  font-family:'IBM Plex Sans', sans-serif;
  color: var(--chalk);
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ---------- TOPBAR ---------- */
#topbar{
  flex:0 0 auto;
  background: var(--navy-2);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: max(10px, env(safe-area-inset-top)) 14px 10px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  z-index:50;
}
#brand{
  font-family:'Zilla Slab', serif;
  font-weight:700;
  font-size:18px;
  letter-spacing:0.2px;
  color: var(--chalk);
  margin-right:4px;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:9px;
}
#brand .logo{
  height:26px;
  width:auto;
  display:block;
  flex:0 0 auto;
}
#brand .brand-text{
  display:flex;
  align-items:baseline;
  gap:6px;
}
#brand .dot{ color:var(--rust); }
#brand .count{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  color: var(--ink-fade);
  font-weight:500;
}
.spacer{flex:1 1 auto; min-width:6px;}
input[type=search]{
  font-family:'IBM Plex Mono', monospace;
  font-size:13px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--chalk);
  padding:8px 10px;
  border-radius: var(--radius);
  width: 150px;
  outline:none;
}
input[type=search]::placeholder{color:rgba(247,244,236,0.4);}
select{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--chalk);
  padding:8px 8px;
  border-radius: var(--radius);
  outline:none;
}
button{
  font-family:'IBM Plex Mono', monospace;
  cursor:pointer;
  border:none;
}
#newBtn{
  background: var(--rust);
  color: var(--chalk);
  font-size:13px;
  font-weight:600;
  padding:9px 16px;
  border-radius: var(--radius);
  letter-spacing:0.3px;
  box-shadow: 0 2px 6px rgba(196,80,42,0.4);
}
#newBtn:active{ background: var(--rust-dark); }
#syncBtn{
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.14);
  color: var(--ink-fade);
  font-size:11.5px;
  font-weight:500;
  padding:8px 11px;
  border-radius: var(--radius);
  white-space:nowrap;
}
#syncBtn.connected{
  color: var(--ok-green);
  border-color: rgba(92,122,82,0.5);
  background: rgba(92,122,82,0.12);
}
#syncBtn:active{ opacity:0.8; }

/* ---------- BOARD ---------- */
#board-wrap{
  flex:1 1 auto;
  position:relative;
  overflow:auto;
  -webkit-overflow-scrolling: touch;
}
#board{
  position:relative;
  width:2600px;
  height:1800px;
}
.empty-hint{
  position:absolute;
  top:40%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color: rgba(247,244,236,0.35);
  font-family:'Zilla Slab', serif;
  font-size:22px;
  pointer-events:none;
  width:80%;
}
.empty-hint span{
  display:block;
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  margin-top:8px;
  color: rgba(247,244,236,0.25);
}

/* ---------- CARD ---------- */
.card{
  position:absolute;
  width:240px;
  min-height:170px;
  background: var(--paper);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding:14px 14px 12px 14px;
  display:flex;
  flex-direction:column;
  color: var(--graphite);
  background-image: repeating-linear-gradient(transparent, transparent 27px, rgba(58,58,58,0.07) 28px);
  background-position: 0 46px;
  touch-action:none;
  cursor:grab;
}
.card.dragging{ z-index:200; box-shadow: 0 14px 30px rgba(0,0,0,0.4); transition:none; cursor:grabbing; }
.card.late{ box-shadow: var(--shadow), inset 3px 0 0 var(--late-red); }
.card.soon{ box-shadow: var(--shadow), inset 3px 0 0 var(--warn-amber); }
.pin{
  position:absolute;
  top:-7px; left:50%;
  transform: translateX(-50%);
  width:14px; height:14px;
  border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #e08561, var(--rust) 60%, var(--rust-dark));
  box-shadow: 0 2px 3px rgba(0,0,0,0.45);
  pointer-events:none;
}
.card-title, .card-body, .card-foot input[type=date], .del-btn{
  touch-action:auto;
  cursor:auto;
}
.card-title{
  font-family:'Zilla Slab', serif;
  font-weight:600;
  font-size:16.5px;
  line-height:1.25;
  border:none;
  background:transparent;
  outline:none;
  resize:none;
  color: var(--graphite);
  margin-bottom:6px;
  padding:0;
  width:100%;
  min-height:21px;
  overflow:hidden;
}
.card-title::placeholder{
  color: var(--ink-fade);
  opacity:0.8;
  font-weight:500;
  font-style:italic;
}
.card-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  color: var(--ink-fade);
  letter-spacing:0.2px;
  margin-bottom:8px;
  text-transform:uppercase;
}
.card-meta .stamp{
  border:1px solid var(--ink-fade);
  border-radius:2px;
  padding:1px 5px;
}
.card-body{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:13.5px;
  line-height:28px;
  color: var(--graphite);
  border:none;
  background:transparent;
  outline:none;
  resize:none;
  flex:1 1 auto;
  min-height:90px;
  padding:0;
  width:100%;
}
.card-body[data-empty="1"]:before{
  content: attr(placeholder);
  color: var(--ink-fade);
  opacity:0.8;
  font-style:italic;
  pointer-events:none;
}
.card-link{
  color: var(--rust-dark);
  text-decoration: none;
  border-bottom: 1px dashed var(--rust-dark);
  cursor:pointer;
  font-weight:500;
}
.card-foot{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:8px;
  padding-top:6px;
  border-top:1px dashed rgba(58,58,58,0.25);
}
.card-foot label{
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  color: var(--ink-fade);
  text-transform:uppercase;
  letter-spacing:0.3px;
}
.card-foot input[type=date]{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  border:1px solid rgba(58,58,58,0.2);
  background: rgba(255,255,255,0.5);
  border-radius:3px;
  padding:2px 4px;
  color: var(--graphite);
  outline:none;
}
.del-btn{
  margin-left:auto;
  background:transparent;
  color: var(--ink-fade);
  font-size:14px;
  line-height:1;
  padding:2px 4px;
  border-radius:3px;
}
.del-btn:active{ color: var(--late-red); }

/* ghost link target highlight */
.card.target-flash{
  box-shadow: 0 0 0 3px var(--rust), var(--shadow);
}

@media (max-width: 600px){
  #brand{font-size:17px;}
  input[type=search]{width:110px;}
}
</style>
</head>

<script type="module">
/* ============================================================
   CONFIGURATION FIREBASE (synchronisation entre appareils)
   ------------------------------------------------------------
   1. Va sur https://console.firebase.google.com → crée un projet
      (gratuit, aucune carte bancaire requise).
   2. Dans le projet : "Compilation" → "Firestore Database" →
      "Créer une base de données" → mode "Production" (peu importe
      la région). Puis onglet "Règles", remplace par :
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /spaces/{spaceId}/cards/{cardId} {
              allow read, write: if true;
            }
          }
        }
      (accès libre par "code d'espace" plutôt que par compte —
      suffisant pour un usage privé/équipe restreinte)
   3. "Paramètres du projet" (roue crantée) → onglet "Général" →
      en bas, "Vos applications" → icône Web "</>" → donne-lui un
      nom → copie l'objet firebaseConfig généré et colle-le
      ci-dessous à la place des valeurs TON_....
   Si cette config n'est pas remplie, ou si Firebase est injoignable
   (pas de réseau, etc.), l'application continue de fonctionner
   normalement en mode 100% local — la synchronisation est un bonus,
   jamais une dépendance.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCN5dIEIKSz9VM-GE6xTF7_hulBPuaGKWU",
  authDomain: "bouchereminder.firebaseapp.com",
  projectId: "bouchereminder",
  storageBucket: "bouchereminder.firebasestorage.app",
  messagingSenderId: "588905995557",
  appId: "1:588905995557:web:df4f1c0e05ce086a944ecc"
};

const syncEnabled_configured = firebaseConfig.apiKey !== "TON_API_KEY";
let syncEnabled = false; // becomes true only once Firebase has actually loaded successfully
let db = null;
let _fsDoc, _fsSetDoc, _fsDeleteDoc, _fsCollection, _fsOnSnapshot;

let spaceCode = localStorage.getItem('fiches_space_code') || '';
let unsubscribeSpace = null;
let firstSnapshotProcessed = false;
const debounceTimers = {};

const STORAGE_KEY = 'fiches_app_v1';
let state = load();
const board = document.getElementById('board');
const boardWrap = document.getElementById('board-wrap');
const emptyHint = document.getElementById('emptyHint');
const countLabel = document.getElementById('countLabel');
const searchBox = document.getElementById('searchBox');
const sortSelect = document.getElementById('sortSelect');

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { cards: [] };
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ---------- SYNCHRONISATION FIREBASE ---------- */
const syncBtn = document.getElementById('syncBtn');

function updateSyncLabel(){
  if(!syncEnabled){
    syncBtn.textContent = '☁ Hors-ligne';
    syncBtn.classList.remove('connected');
    syncBtn.title = "Synchronisation non configurée (configuration Firebase manquante)";
    return;
  }
  if(spaceCode){
    syncBtn.textContent = '☁ ' + spaceCode;
    syncBtn.classList.add('connected');
    syncBtn.title = "Synchronisé avec l'espace « " + spaceCode + " ». Touche pour changer.";
  } else {
    syncBtn.textContent = '☁ Connecter';
    syncBtn.classList.remove('connected');
    syncBtn.title = "Touche pour relier cet appareil à un espace partagé";
  }
}

function cardToPlain(card){
  return {
    title: card.title || '',
    body: card.body || '',
    deadline: card.deadline || '',
    created: card.created,
    x: card.x, y: card.y, z: card.z || 0
  };
}

async function initFirebaseIfConfigured(){
  if(!syncEnabled_configured) return; // config not filled in — stay fully offline, no network call at all
  try{
    const [appMod, fsMod] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js")
    ]);
    const fbApp = appMod.initializeApp(firebaseConfig);
    db = fsMod.getFirestore(fbApp);
    _fsDoc = fsMod.doc;
    _fsSetDoc = fsMod.setDoc;
    _fsDeleteDoc = fsMod.deleteDoc;
    _fsCollection = fsMod.collection;
    _fsOnSnapshot = fsMod.onSnapshot;
    try{ await fsMod.enableIndexedDbPersistence(db); }catch(e){ /* multi-tab / private mode — sync still works online */ }
    syncEnabled = true;
    updateSyncLabel();
    if(spaceCode) connectSpace(spaceCode);
  }catch(e){
    console.warn('Synchronisation indisponible (réseau ou configuration) — application en mode local uniquement.', e);
    syncEnabled = false;
    updateSyncLabel();
  }
}

function remoteSet(card){
  if(!syncEnabled || !spaceCode || !db) return;
  _fsSetDoc(_fsDoc(db, 'spaces', spaceCode, 'cards', card.id), cardToPlain(card)).catch(e=>console.warn('sync set failed', e));
}
function remoteSetDebounced(card, delay=600){
  if(!syncEnabled || !spaceCode) return;
  clearTimeout(debounceTimers[card.id]);
  debounceTimers[card.id] = setTimeout(()=> remoteSet(card), delay);
}
function remoteDelete(id){
  if(!syncEnabled || !spaceCode || !db) return;
  _fsDeleteDoc(_fsDoc(db, 'spaces', spaceCode, 'cards', id)).catch(e=>console.warn('sync delete failed', e));
}

function applyRemoteCard(id, data){
  let card = state.cards.find(c=>c.id===id);
  let el = document.querySelector(`.card[data-id="${id}"]`);
  const isNew = !card;
  if(!card){
    card = { id, title:'', body:'', deadline:'', created: data.created || new Date().toISOString(), x: data.x||60, y: data.y||60, z: ++zCounter };
    state.cards.push(card);
  }
  const titleFocused = el && document.activeElement === el.querySelector('.card-title');
  const bodyFocused = el && document.activeElement === el.querySelector('.card-body');
  const dragging = el && el.classList.contains('dragging');

  if(!titleFocused && data.title !== undefined) card.title = data.title;
  if(!bodyFocused && data.body !== undefined) card.body = data.body;
  if(data.deadline !== undefined) card.deadline = data.deadline;
  if(!dragging){
    if(data.x !== undefined) card.x = data.x;
    if(data.y !== undefined) card.y = data.y;
  }
  if(data.z !== undefined && data.z > (card.z||0)) card.z = data.z;
  if(data.z !== undefined && data.z > zCounter) zCounter = data.z;

  if(isNew){
    createCardEl(card);
  } else if(el){
    if(!titleFocused){ el.querySelector('.card-title').value = card.title; autoResize(el.querySelector('.card-title')); }
    if(!bodyFocused){
      const bEl = el.querySelector('.card-body');
      bEl.innerHTML = renderBodyWithLinks(card.body, card.id);
      toggleEmpty(bEl, card.body);
    }
    el.querySelector('input[type=date]').value = card.deadline || '';
    el.classList.remove('late','soon');
    const st = deadlineStatus(card.deadline);
    if(st) el.classList.add(st);
    if(!dragging){ el.style.left = card.x+'px'; el.style.top = card.y+'px'; }
    if(data.z !== undefined) el.style.zIndex = card.z;
  }
}

function applyRemoteRemoval(id){
  state.cards = state.cards.filter(c=>c.id!==id);
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if(el) el.remove();
}

function connectSpace(code){
  spaceCode = code.trim();
  localStorage.setItem('fiches_space_code', spaceCode);
  firstSnapshotProcessed = false;
  updateSyncLabel();
  if(unsubscribeSpace){ unsubscribeSpace(); unsubscribeSpace = null; }
  if(!spaceCode || !syncEnabled) return;

  unsubscribeSpace = _fsOnSnapshot(
    _fsCollection(db, 'spaces', spaceCode, 'cards'),
    (snapshot)=>{
      snapshot.docChanges().forEach(change=>{
        if(change.type === 'removed') applyRemoteRemoval(change.doc.id);
        else applyRemoteCard(change.doc.id, change.doc.data());
      });
      if(!firstSnapshotProcessed){
        // push up any cards created locally/offline before this device first connected
        const remoteIds = new Set(snapshot.docs.map(d=>d.id));
        state.cards.forEach(c=>{ if(!remoteIds.has(c.id)) remoteSet(c); });
        firstSnapshotProcessed = true;
      }
      rerenderAllBodies();
      updateCountAndFilter();
      save();
    },
    (err)=>{ console.warn('sync error', err); }
  );
}

syncBtn.addEventListener('click', ()=>{
  if(!syncEnabled){
    alert("La synchronisation entre appareils n'est pas encore activée dans cette app (configuration Firebase manquante dans le fichier). Demande à Claude de l'activer si besoin.");
    return;
  }
  const code = prompt("Code d'espace partagé — utilise exactement le même code sur tous tes appareils pour qu'ils se synchronisent ensemble :", spaceCode || '');
  if(code !== null && code.trim()){
    connectSpace(code);
  }
});
function uid(){ return 'f' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function deadlineStatus(dl){
  if(!dl) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dl+'T00:00:00');
  const diffDays = Math.round((d-today)/86400000);
  if(diffDays < 0) return 'late';
  if(diffDays <= 3) return 'soon';
  return '';
}

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'2-digit'});
}

function renderBodyWithLinks(text, selfId){
  // sort other titles by length desc to match longest first, ignore empty/short titles
  const others = state.cards.filter(c => c.id !== selfId && c.title && c.title.trim().length > 1);
  let html = escapeHtml(text);
  if(others.length === 0) return html.replace(/\n/g,'<br>');
  // build regex alternation, longest titles first, case-insensitive
  others.sort((a,b)=> b.title.length - a.title.length);
  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern = others.map(c => esc(escapeHtml(c.title.trim()))).join('|');
  if(pattern){
    const re = new RegExp('(' + pattern + ')', 'gi');
    html = html.replace(re, (match) => {
      const target = others.find(c => c.title.trim().toLowerCase() === match.toLowerCase());
      if(!target) return match;
      return `<span class="card-link" data-target="${target.id}">${match}</span>`;
    });
  }
  return html.replace(/\n/g,'<br>');
}

let zCounter = 10;

function createCardEl(card){
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.id = card.id;
  el.style.left = card.x + 'px';
  el.style.top = card.y + 'px';
  el.style.zIndex = card.z || 1;

  const status = deadlineStatus(card.deadline);
  if(status) el.classList.add(status);

  el.innerHTML = `
    <div class="pin" title="Glisser pour déplacer"></div>
    <textarea class="card-title" rows="1" placeholder="Titre">${escapeHtml(card.title)}</textarea>
    <div class="card-meta">
      <span class="stamp">créée ${fmtDate(card.created)}</span>
    </div>
    <div class="card-body" contenteditable="true" placeholder="Texte…"></div>
    <div class="card-foot">
      <label>Deadline</label>
      <input type="date" value="${card.deadline || ''}">
      <button class="del-btn" title="Supprimer">✕</button>
    </div>
  `;

  const bodyEl = el.querySelector('.card-body');
  bodyEl.innerHTML = renderBodyWithLinks(card.body, card.id);
  toggleEmpty(bodyEl, card.body);

  // Title edits
  const titleEl = el.querySelector('.card-title');
  autoResize(titleEl);
  titleEl.addEventListener('input', ()=>{
    autoResize(titleEl);
    card.title = titleEl.value;
    save();
    remoteSetDebounced(card);
    rerenderAllBodies();
    updateCountAndFilter();
  });

  // Body edits (plain text capture, re-render links on blur/input)
  let bodyEditing = false;
  bodyEl.addEventListener('focus', ()=>{
    bodyEditing = true;
    bodyEl.innerText = card.body; // raw text while editing
    toggleEmpty(bodyEl, card.body);
  });
  bodyEl.addEventListener('input', ()=>{
    card.body = bodyEl.innerText;
    toggleEmpty(bodyEl, card.body);
    save();
    remoteSetDebounced(card);
  });
  bodyEl.addEventListener('blur', ()=>{
    bodyEditing = false;
    card.body = bodyEl.innerText;
    bodyEl.innerHTML = renderBodyWithLinks(card.body, card.id);
    toggleEmpty(bodyEl, card.body);
    save();
    remoteSet(card); // flush immediately on blur
  });
  // click on link (only when not editing)
  bodyEl.addEventListener('mousedown', (e)=>{
    if(e.target.classList.contains('card-link')){
      e.preventDefault(); // stop caret placement / focus so we don't flip into edit mode
      goToCard(e.target.dataset.target);
    }
  });
  bodyEl.addEventListener('touchstart', (e)=>{
    if(e.target.classList.contains('card-link')){
      e.preventDefault();
      goToCard(e.target.dataset.target);
    }
  }, {passive:false});
  bodyEl.addEventListener('click', (e)=>{
    if(bodyEditing) return;
    if(e.target.classList.contains('card-link')){
      e.preventDefault();
      goToCard(e.target.dataset.target);
    }
  });

  // deadline
  const dlInput = el.querySelector('input[type=date]');
  dlInput.addEventListener('change', ()=>{
    card.deadline = dlInput.value;
    save();
    remoteSet(card);
    el.classList.remove('late','soon');
    const st = deadlineStatus(card.deadline);
    if(st) el.classList.add(st);
  });

  // delete
  el.querySelector('.del-btn').addEventListener('click', ()=>{
    if(confirm('Supprimer cette fiche ?')){
      state.cards = state.cards.filter(c=>c.id!==card.id);
      save();
      remoteDelete(card.id);
      el.remove();
      rerenderAllBodies();
      updateCountAndFilter();
    }
  });

  // drag the whole card (press and hold anywhere that isn't a text field, date picker or delete button)
  makeDraggable(el, el, card);

  board.appendChild(el);
  autoResize(titleEl); // re-measure now that the element is actually in the DOM
  return el;
}

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = (ta.scrollHeight) + 'px';
}

function toggleEmpty(bodyEl, text){
  if(!text || text.trim()===''){
    bodyEl.setAttribute('data-empty','1');
  } else {
    bodyEl.removeAttribute('data-empty');
  }
}

function bringToFront(el, card){
  zCounter++;
  el.style.zIndex = zCounter;
  card.z = zCounter;
}

function makeDraggable(handle, el, card){
  let startX, startY, origX, origY, dragging=false, pointerId=null;

  handle.addEventListener('pointerdown', (e)=>{
    // always bring the card forward on interaction
    bringToFront(el, card);

    // don't start a drag from interactive controls — let them work normally
    if(e.target.closest('.card-title, .card-body, input[type=date], .del-btn')){
      save();
      return;
    }

    e.preventDefault();
    dragging = true;
    pointerId = e.pointerId;
    handle.setPointerCapture(pointerId);
    startX = e.clientX; startY = e.clientY;
    origX = card.x; origY = card.y;
    el.classList.add('dragging');
    save();
  });
  handle.addEventListener('pointermove', (e)=>{
    if(!dragging || e.pointerId !== pointerId) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    card.x = Math.max(0, origX + dx);
    card.y = Math.max(0, origY + dy);
    el.style.left = card.x + 'px';
    el.style.top = card.y + 'px';
  });
  function endDrag(e){
    if(!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    save();
    remoteSet(card);
  }
  handle.addEventListener('pointerup', endDrag);
  handle.addEventListener('pointercancel', endDrag);
}

function rerenderAllBodies(){
  document.querySelectorAll('.card').forEach(el=>{
    const id = el.dataset.id;
    const card = state.cards.find(c=>c.id===id);
    if(!card) return;
    const bodyEl = el.querySelector('.card-body');
    if(document.activeElement === bodyEl) return; // don't disturb active editing
    bodyEl.innerHTML = renderBodyWithLinks(card.body, card.id);
  });
}

function goToCard(id){
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if(!el) return;
  const card = state.cards.find(c=>c.id===id);
  if(card){
    zCounter++;
    card.z = zCounter;
    el.style.zIndex = zCounter;
    save();
  }
  const targetLeft = parseFloat(el.style.left) - boardWrap.clientWidth/2 + 120;
  const targetTop = parseFloat(el.style.top) - boardWrap.clientHeight/2 + 80;
  boardWrap.scrollTo({left: Math.max(0,targetLeft), top: Math.max(0,targetTop), behavior:'smooth'});
  el.classList.add('target-flash');
  setTimeout(()=>el.classList.remove('target-flash'), 1200);
}

function updateCountAndFilter(){
  const n = state.cards.length;
  countLabel.textContent = n + (n===1 ? ' fiche' : ' fiches');
  emptyHint.style.display = n===0 ? 'block' : 'none';
  applyFilter();
}

function applyFilter(){
  const q = searchBox.value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(el=>{
    const id = el.dataset.id;
    const card = state.cards.find(c=>c.id===id);
    if(!card) return;
    const match = !q || card.title.toLowerCase().includes(q);
    el.style.display = match ? 'flex' : 'none';
  });
}

function applySort(){
  const mode = sortSelect.value;
  let sorted = [...state.cards];
  if(mode === 'created_desc') sorted.sort((a,b)=> b.created.localeCompare(a.created));
  else if(mode === 'created_asc') sorted.sort((a,b)=> a.created.localeCompare(b.created));
  else if(mode === 'title') sorted.sort((a,b)=> a.title.localeCompare(b.title,'fr'));
  else if(mode === 'deadline') sorted.sort((a,b)=>{
    if(!a.deadline && !b.deadline) return 0;
    if(!a.deadline) return 1;
    if(!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  // visually arrange them in a flowing grid (does not move free-form pins permanently—
  // only used as "tidy" layout trigger if user wants order reference; we just bring to front in order)
  sorted.forEach((card, i)=>{
    const el = document.querySelector(`.card[data-id="${card.id}"]`);
    if(el) el.style.zIndex = 100 + i;
  });
}

function addCard(){
  const card = {
    id: uid(),
    title: '',
    body: '',
    deadline: '',
    created: new Date().toISOString(),
    x: 60 + (state.cards.length % 6) * 30,
    y: 40 + (state.cards.length % 6) * 26,
    z: ++zCounter
  };
  state.cards.push(card);
  save();
  remoteSet(card);
  const el = createCardEl(card);
  updateCountAndFilter();
  el.querySelector('.card-title').focus();
  // scroll into view
  goToCard(card.id);
}

document.getElementById('newBtn').addEventListener('click', addCard);
searchBox.addEventListener('input', applyFilter);
sortSelect.addEventListener('change', applySort);

// initial render
state.cards.forEach(c => {
  if(c.z===undefined) c.z = ++zCounter;
  createCardEl(c);
});
zCounter = Math.max(10, ...state.cards.map(c=>c.z||10));
updateCountAndFilter();

// Synchronisation : tentative non-bloquante, l'app reste pleinement
// fonctionnelle en local que ça réussisse ou non.
updateSyncLabel();
initFirebaseIfConfigured();

// register service worker for offline use
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
